<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Belegungskalender</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .calendar { width: 320px; margin: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
    .day { border: 1px solid #ccc; padding: 5px; text-align: center; font-size: 12px; }
    .frei { background-color: #c8f7c5; }
    .belegt { background-color: #f7c5c5; }
    button { padding: 5px 10px; }
  </style>
</head>
<body>

<div class="calendar">
  <div class="header">
    <button onclick="prevMonth()">◀</button>
    <h3 id="monthYear"></h3>
    <button onclick="nextMonth()">▶</button>
  </div>
  <div class="grid" id="calendarGrid"></div>
</div>

<script>
  const data = {
    "2026-04-01": { status: "frei", price: 80 },
    "2026-04-02": { status: "belegt" },
    "2026-04-03": { status: "frei", price: 95 }
  };

  let currentDate = new Date();

  function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    const monthYear = document.getElementById("monthYear");
    grid.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    monthYear.innerText = currentDate.toLocaleString('de-DE', { month: 'long', year: 'numeric' });

    for (let i = 0; i < firstDay; i++) {
      grid.innerHTML += "<div></div>";
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const entry = data[dateStr];

      let className = "day";
      let text = day;

      if (entry) {
        if (entry.status === "frei") {
          className += " frei";
          text += `<br>${entry.price}€`;
        } else {
          className += " belegt";
          text += "<br>Belegt";
        }
      }

      grid.innerHTML += `<div class="${className}">${text}</div>`;
    }
  }

  function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  }

  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  }

  renderCalendar();
</script>

</body>
</html>
